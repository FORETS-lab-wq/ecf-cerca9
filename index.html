<title>Schématisation numérique ECF CERCA</title>
<style>
/* ═══════════════════════════════════════════
   RESET & VARIABLES
═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
:root{
  --bg:#f0ede7;
  --panel:#1c1c1e;
  --panel2:#2c2c2e;
  --acc:#e8321e;
  --blue:#0a7aff;
  --green:#30b94a;
  --muted:#8e8e93;
  --sb:230px;
}

/* ═══════════════════════════════════════════
   LAYOUT : canvas à gauche, sidebar à droite
═══════════════════════════════════════════ */
#app{display:flex;width:100vw;height:100dvh;flex-direction:row-reverse;}

/* ═══════════════════════════════════════════
   SIDEBAR (droite)
═══════════════════════════════════════════ */
#sb{
  width:var(--sb);min-width:var(--sb);
  background:var(--panel);
  display:flex;flex-direction:column;
  z-index:20;
  box-shadow:-2px 0 18px rgba(0,0,0,.4);
  transition:width .22s ease,min-width .22s ease;
  overflow:hidden;
}
#sb.hidden{width:0;min-width:0;}

/* Logo */
.sb-head{
  padding:12px 14px 10px;
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:9px;
  flex-shrink:0;
}
.sb-ico{width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,#e8321e,#ff7a00);
  display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}
.sb-name{font-size:.7rem;font-weight:800;letter-spacing:3px;color:var(--acc);}
.sb-sub{font-size:.52rem;color:var(--muted);}

/* Tabs */
.sb-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.sb-tab{
  flex:1;padding:8px 2px;text-align:center;cursor:pointer;
  font-size:.52rem;font-weight:700;letter-spacing:.7px;
  color:var(--muted);border-bottom:2.5px solid transparent;
  transition:color .12s,border-color .12s;white-space:nowrap;
}
.sb-tab.on{color:var(--acc);border-bottom-color:var(--acc);}
.sb-pane{display:none;flex-direction:column;overflow:hidden;flex:1;}
.sb-pane.on{display:flex;}

/* Scrollable area inside pane */
.sb-scroll{overflow-y:auto;flex:1;padding-bottom:8px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}

/* Section label */
.lbl{font-size:.52rem;font-weight:700;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;padding:7px 13px 3px;}

/* Tool button */
.tb{
  display:flex;align-items:center;gap:8px;
  padding:7px 13px;border:none;background:transparent;
  width:100%;text-align:left;
  color:rgba(255,255,255,.6);font-size:.74rem;font-weight:500;
  cursor:pointer;transition:background .12s;
}
.tb:hover{background:rgba(255,255,255,.055);color:#fff;}
.tb.on{background:rgba(232,50,30,.16);color:var(--acc);}
.tb-i{
  width:26px;height:26px;border-radius:6px;
  background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;flex-shrink:0;
}
.tb.on .tb-i{background:rgba(232,50,30,.22);}

/* Color grid */
.cg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:4px 13px;}
.cd{
  width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:transform .12s,border-color .12s;
}
.cd:hover{transform:scale(1.2);}
.cd.on{border-color:#fff;transform:scale(1.06);}

/* Stroke row */
.sr{display:flex;gap:5px;padding:4px 13px;}
.so{
  flex:1;height:26px;border-radius:5px;
  background:rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .12s;
}
.so:hover{background:rgba(255,255,255,.14);}
.so.on{background:rgba(232,50,30,.26);}
.sl{background:#fff;border-radius:2px;width:62%;}

/* Element button */
.eb{
  display:flex;align-items:center;gap:8px;padding:6px 13px;
  border:none;background:transparent;color:rgba(255,255,255,.62);
  font-size:.72rem;cursor:pointer;transition:background .12s;
  width:100%;text-align:left;
}
.eb:hover{background:rgba(255,255,255,.055);color:#fff;}
.ei{font-size:1.05rem;width:22px;text-align:center;flex-shrink:0;}
.ec{padding:6px 13px 2px;font-size:.52rem;font-weight:700;
  letter-spacing:1.5px;color:rgba(255,255,255,.26);
  text-transform:uppercase;margin-top:3px;}

/* Scenario cards */
.sc-sec{font-size:.52rem;font-weight:700;letter-spacing:1.5px;
  color:rgba(255,255,255,.3);text-transform:uppercase;
  padding:8px 13px 4px;margin-top:4px;}
.sc-card{
  display:flex;align-items:center;gap:9px;
  padding:8px 13px;border:none;background:transparent;
  color:rgba(255,255,255,.7);font-size:.72rem;cursor:pointer;
  transition:background .12s;width:100%;text-align:left;
}
.sc-card:hover{background:rgba(255,255,255,.07);color:#fff;}
.sc-ico{font-size:1.2rem;flex-shrink:0;}
.sc-info{display:flex;flex-direction:column;gap:1px;}
.sc-name{font-size:.72rem;font-weight:600;}
.sc-desc{font-size:.6rem;color:var(--muted);}

/* Bottom export buttons */
.sb-foot{
  padding:10px 13px;
  border-top:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;gap:6px;
  flex-shrink:0;
}
.xbtn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 10px;border-radius:8px;border:none;
  font-size:.74rem;font-weight:600;cursor:pointer;transition:all .12s;
}
.xbtn.png{background:rgba(255,255,255,.1);color:#fff;}
.xbtn.png:hover{background:rgba(255,255,255,.18);}
.xbtn.pdf{background:rgba(232,50,30,.22);color:#ff6b5e;}
.xbtn.pdf:hover{background:rgba(232,50,30,.35);color:#fff;}
.xbtn.doc{background:rgba(10,122,255,.22);color:#60aeff;}
.xbtn.doc:hover{background:rgba(10,122,255,.35);color:#fff;}
.xbtn-row{display:flex;gap:6px;}
.xbtn-row .xbtn{flex:1;}

/* ═══════════════════════════════════════════
   CANVAS AREA
═══════════════════════════════════════════ */
#cWrap{
  flex:1;position:relative;background:var(--bg);overflow:hidden;
  min-width:0;
}
#c{position:absolute;top:0;left:0;touch-action:none;}

/* ═══════════════════════════════════════════
   TOP-LEFT HUD (remplace la topbar)
═══════════════════════════════════════════ */
#hud{
  position:absolute;top:10px;left:10px;
  display:flex;align-items:center;gap:6px;
  z-index:15;pointer-events:auto;
}
.hbtn{
  background:rgba(28,28,30,.82);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.1);
  color:#fff;border-radius:9px;
  padding:6px 10px;font-size:.72rem;font-weight:600;
  cursor:pointer;transition:background .12s;
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.hbtn:hover{background:rgba(60,60,65,.9);}
.hbtn.red{color:#ff6b5e;}
.hbtn.red:hover{background:rgba(232,50,30,.35);}
#hudTitle{
  background:rgba(28,28,30,.72);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.08);
  color:var(--muted);border-radius:9px;
  padding:6px 12px;font-size:.7rem;font-weight:600;
  font-family:'SF Mono',monospace;pointer-events:none;
  max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
/* selection actions */
#selHud{
  position:absolute;top:10px;right:calc(var(--sb) + 10px);
  display:none;align-items:center;gap:5px;z-index:15;
}
#selHud.show{display:flex;}

/* ═══════════════════════════════════════════
   MOBILE OVERLAY SIDEBAR
═══════════════════════════════════════════ */
#sbOv{display:none;position:fixed;inset:0;z-index:15;
  background:rgba(0,0,0,.4);backdrop-filter:blur(3px);}
#sbOv.show{display:block;}

@media(max-width:680px){
  :root{--sb:0px;}
  #sb{
    position:fixed;top:0;right:0;height:100dvh;
    width:240px;min-width:240px;
    transform:translateX(100%);
    transition:transform .22s ease;
  }
  #sb.open{transform:translateX(0);}
  #selHud{right:10px;}
}
</style>
</head>
